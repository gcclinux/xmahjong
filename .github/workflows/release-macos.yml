name: Release macOS Packages

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install SDL2 dependencies
        run: brew install sdl2 sdl2_image sdl2_mixer sdl2_ttf

      - name: Build packages
        run: |
          chmod +x package_macos.sh
          ./package_macos.sh all

      - name: Get version from release file
        id: version
        run: echo "version=$(tr -d '[:space:]' < release)" >> "$GITHUB_OUTPUT"

      - name: Upload macOS packages to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version.outputs.version }}"
          files: |
            target/package/*-${{ steps.version.outputs.version }}-*.dmg
            target/package/*-${{ steps.version.outputs.version }}-*.zip
          fail_on_unmatched_files: true
