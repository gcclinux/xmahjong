name: Release Linux ARM64 Packages

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux-arm64:
    runs-on: ubuntu-22.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-arm64-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-arm64-cargo-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
            dpkg-dev rpm wget

      - name: Build packages
        run: |
          chmod +x package.sh
          ./package.sh all

      - name: Get version from release file
        id: version
        run: echo "version=$(tr -d '[:space:]' < release)" >> "$GITHUB_OUTPUT"

      - name: Upload Linux ARM64 packages to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version.outputs.version }}"
          files: |
            target/package/*.deb
            target/package/*.rpm
            target/package/*.AppImage
          fail_on_unmatched_files: true
