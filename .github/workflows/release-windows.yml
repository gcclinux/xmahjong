name: Release Windows Packages

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install WiX Toolset
        shell: pwsh
        run: |
          dotnet tool uninstall --global wix 2>$null
          dotnet tool install --global wix --version 4.0.5
          Write-Host "WiX version installed:"
          wix --version
          wix extension add -g WixToolset.UI.wixext/4.0.5

      - name: Remove stale WiX extension cache
        shell: pwsh
        run: |
          if (Test-Path ".wix") { Remove-Item ".wix" -Recurse -Force }

      - name: Build portable ZIP and MSI
        shell: pwsh
        run: |
          .\package.ps1 -Action msi

      - name: Get version from release file
        id: version
        shell: pwsh
        run: |
          $ver = (Get-Content release -Raw).Trim()
          echo "version=$ver" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version.outputs.version }}"
          name: "xMahjong v${{ steps.version.outputs.version }}"
          body: |
            ## Windows Packages

            | Package | Format | Install |
            |---------|--------|---------|
            | `.zip` | Portable | Extract and run `xmahjong.exe` |
            | `.msi` | Installer | Double-click to install |

            ### Dependencies (Windows)
            All SDL2 runtime DLLs are bundled in both packages.

            ---

            ## macOS Packages

            | Package | Format | Install |
            |---------|--------|---------|
            | `.dmg` | Disk Image | Open and drag to Applications |
            | `.zip` | App Bundle | Extract and run `xMahjong.app` |

            ### Dependencies (macOS)
            All SDL2 libraries are bundled inside the .app. No Homebrew needed.

            ---

            ## Linux Packages

            | Package | Format | Install |
            |---------|--------|---------|
            | `.deb` | Debian/Ubuntu (x64 + arm64) | `sudo dpkg -i xmahjong_*.deb` |
            | `.rpm` | Fedora/openSUSE (x64 + arm64) | `sudo rpm -i xmahjong-*.rpm` |
            | `.AppImage` | Universal (x64 + arm64) | `chmod +x xmahjong-*.AppImage && ./xmahjong-*.AppImage` |

            ### Dependencies (Linux)
            All packages require SDL2, SDL2_image, SDL2_mixer, and SDL2_ttf.
            The AppImage bundles these libraries automatically.
          files: |
            target/package/*-${{ steps.version.outputs.version }}-*.zip
            target/package/*-${{ steps.version.outputs.version }}-*.msi
          fail_on_unmatched_files: true
