name: lmahjong
base: core22
version: '0.1.0'
summary: Tux-themed Mahjong solitaire game for Linux
description: |
  LMahjong is a tile-matching Mahjong solitaire game built for the Linux
  gaming community. Features Tux penguin-themed graphics, a classic Turtle
  layout with 144 tiles across 5 layers, hint system, undo, shuffle, timer,
  scoring, and a local leaderboard. Celebrates Linux culture through its
  visual theme.

grade: stable
confinement: strict

architectures:
  - build-on: amd64

apps:
  lmahjong:
    command: snap/local/launcher.sh
    plugs:
      - x11
      - wayland
      - opengl
      - audio-playback
      - home
    desktop: snap/gui/lmahjong.desktop

parts:
  lmahjong:
    plugin: rust
    source: .
    build-packages:
      - libsdl2-dev
      - libsdl2-image-dev
      - libsdl2-mixer-dev
      - libsdl2-ttf-dev
      - pkg-config
    stage-packages:
      - libsdl2-2.0-0
      - libsdl2-image-2.0-0
      - libsdl2-mixer-2.0-0
      - libsdl2-ttf-2.0-0
      - libgl1-mesa-dri
      - libgl1-mesa-glx
      - libpulse0
      - libasound2
      - libwayland-client0
      - libwayland-cursor0
      - libwayland-egl1
      - libx11-6
      - libxcursor1
      - libxext6
      - libxi6
      - libxrandr2
      - libxss1

  assets:
    plugin: dump
    source: assets/
    organize:
      '*': assets/

  launcher:
    plugin: dump
    source: snap/local/
    organize:
      launcher.sh: snap/local/launcher.sh
